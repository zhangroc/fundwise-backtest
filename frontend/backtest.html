<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <title>回测分析 - 基智回测</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="lib/chart.min.js"></script>
    <script src="includes/api-client.js"></script>
    <style>
        /* 回测页面样式 */
        .backtest-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 1.5rem;
        }
        
        .config-panel {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            height: fit-content;
        }
        
        .config-panel h3 {
            font-size: 1rem;
            color: #1e293b;
            margin: 0 0 1.25rem 0;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 0.35rem;
        }
        
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        
        .result-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        /* 统计卡片 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        
        .metric-card {
            background: white;
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .metric-card .metric-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 0.5rem;
        }
        
        .metric-card .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .metric-card .metric-value.positive { color: #10b981; }
        .metric-card .metric-value.negative { color: #ef4444; }
        
        /* 图表 */
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .chart-card h3 {
            font-size: 1rem;
            color: #1e293b;
            margin: 0 0 1rem 0;
        }
        
        .chart-container {
            height: 350px;
            position: relative;
        }
        
        /* 持仓表格 */
        .holdings-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .holdings-card h3 {
            font-size: 1rem;
            color: #1e293b;
            margin: 0 0 1rem 0;
        }
        
        .holdings-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .holdings-table th {
            text-align: left;
            padding: 0.75rem;
            font-size: 0.8rem;
            color: #64748b;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .holdings-table td {
            padding: 0.75rem;
            font-size: 0.9rem;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .empty-result {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }
        
        .empty-result i {
            font-size: 4rem;
            color: #e2e8f0;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <span class="logo-text">基智回测</span>
            </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="index.html" class="nav-link"><i class="fas fa-home"></i><span>首页</span></a>
                    <a href="screening.html" class="nav-link"><i class="fas fa-filter"></i><span>基金筛选</span></a>
                    <a href="portfolio.html" class="nav-link"><i class="fas fa-briefcase"></i><span>我的组合</span></a>
                    <a href="backtest.html" class="nav-link active"><i class="fas fa-chart-area"></i><span>历史回测</span></a>
                    <a href="recommend.html" class="nav-link"><i class="fas fa-lightbulb"></i><span>智能推荐</span></a>
                    <a href="compare.html" class="nav-link"><i class="fas fa-balance-scale"></i><span>组合对比</span></a>
                    <a href="detail.html" class="nav-link"><i class="fas fa-chart-bar"></i><span>基金详情</span></a>
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">回测分析</h1>
                    <p class="page-subtitle">基于真实历史数据评估投资组合表现</p>
                </div>
            </header>

            <div class="page-content">
                <div class="backtest-container">
                    <!-- 配置面板 -->
                    <div class="config-panel">
                        <h3><i class="fas fa-cog"></i> 回测配置</h3>
                        <div class="form-group">
                            <label>选择组合</label>
                            <select id="portfolioSelect">
                                <option value="">请选择组合</option>
                                <option value="3">智能稳健组合</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>回测开始日期</label>
                            <input type="date" id="startDate" value="2024-01-01" min="2001-01-01" max="2026-12-31" required>
                        </div>
                        <div class="form-group">
                            <label>回测结束日期</label>
                            <input type="date" id="endDate" value="2024-12-31" min="2001-01-01" max="2026-12-31" required>
                        </div>
                        <div class="form-group">
                            <label>初始资金（元）</label>
                            <input type="number" id="initialCapital" value="10000" min="1" max="100000000" step="1000" required>
                        </div>
                        <button class="btn btn-primary" style="width: 100%;" onclick="runBacktest()">
                            <i class="fas fa-play"></i> 开始回测
                        </button>
                    </div>
                    
                    <!-- 结果面板 -->
                    <div class="result-panel">
                        <!-- 统计指标 -->
                        <div class="metrics-grid">
                            <div class="metric-card">
                                <div class="metric-label">总收益率</div>
                                <div class="metric-value" id="totalReturn">--</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">年化收益率</div>
                                <div class="metric-value" id="annualizedReturn">--</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">最大回撤</div>
                                <div class="metric-value negative" id="maxDrawdown">--</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">夏普比率</div>
                                <div class="metric-value" id="sharpeRatio">--</div>
                            </div>
                        </div>
                        
                        <!-- 收益曲线 -->
                        <div class="chart-card">
                            <h3><i class="fas fa-chart-line"></i> 收益曲线</h3>
                            <div class="chart-container">
                                <canvas id="returnChart"></canvas>
                            </div>
                        </div>
                        
                        <!-- 持仓明细 -->
                        <div class="holdings-card">
                            <h3><i class="fas fa-list"></i> 持仓明细</h3>
                            <table class="holdings-table">
                                <thead>
                                    <tr>
                                        <th>基金代码</th>
                                        <th>基金名称</th>
                                        <th>类型</th>
                                        <th>配置比例</th>
                                    </tr>
                                </thead>
                                <tbody id="holdingsBody">
                                    <tr>
                                        <td colspan="4" style="text-align: center; color: #94a3b8; padding: 2rem;">
                                            请选择组合并点击"开始回测"
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let returnChart = null;
        
        async function runBacktest() {
            const portfolioId = document.getElementById('portfolioSelect').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const initialCapital = parseFloat(document.getElementById('initialCapital').value);
            
            if (!portfolioId) {
                alert('请选择组合');
                return;
            }
            
            // BUG-008: 开始日期晚于结束日期校验
            if (startDate > endDate) {
                alert('结束日期不能早于开始日期');
                return;
            }
            
            // BUG-009: 初始资金为0校验
            if (!initialCapital || initialCapital <= 0) {
                alert('初始资金必须大于0');
                return;
            }
            
            // BUG-010: 初始资金为负数校验 (已在HTML min属性预防，但增加JS校验)
            if (initialCapital < 0) {
                alert('初始资金不能为负数');
                return;
            }
            
            // BUG-011: 日期和资金字段清空校验 (HTML required属性已处理)
            
            try {
                const response = await fetch('/api/backtest/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        portfolioId: parseInt(portfolioId),
                        startDate,
                        endDate,
                        initialCapital
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    renderResults(result.data);
                } else {
                    alert(result.message || '回测失败');
                }
            } catch (e) {
                console.error('回测失败:', e);
                alert('回测失败，请稍后重试');
            }
        }
        
        function renderResults(data) {
            // 更新统计指标
            document.getElementById('totalReturn').textContent = data.totalReturn;
            document.getElementById('totalReturn').className = 'metric-value ' + (data.totalReturnRaw >= 0 ? 'positive' : 'negative');
            
            document.getElementById('annualizedReturn').textContent = data.annualizedReturn;
            document.getElementById('annualizedReturn').className = 'metric-value ' + (data.annualizedReturnRaw >= 0 ? 'positive' : 'negative');
            
            document.getElementById('maxDrawdown').textContent = data.maxDrawdown;
            document.getElementById('sharpeRatio').textContent = data.sharpeRatio;
            
            // 更新持仓明细
            const holdings = [
                { code: '000279', name: '华商红利优选混合', type: '混合型', weight: '35%' },
                { code: '000172', name: '华泰柏瑞增强混合A', type: '混合型', weight: '35%' },
                { code: '000532', name: '景顺长城优势企业混合A', type: '混合型', weight: '30%' }
            ];
            
            document.getElementById('holdingsBody').innerHTML = holdings.map(h => `
                <tr>
                    <td><strong>${h.code}</strong></td>
                    <td>${h.name}</td>
                    <td>${h.type}</td>
                    <td>${h.weight}</td>
                </tr>
            `).join('');
            
            // 绘制图表
            if (data.chartData && data.chartData.length > 0) {
                drawChart(data.chartData);
            }
        }
        
        function drawChart(chartData) {
            const ctx = document.getElementById('returnChart').getContext('2d');
            
            if (returnChart) {
                returnChart.destroy();
            }
            
            const labels = chartData.map(d => d.date);
            const values = chartData.map(d => d.cumulativeNav);
            
            returnChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '组合净值',
                        data: values,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: false }
                    }
                }
            });
        }
    </script>
</body>
</html>
