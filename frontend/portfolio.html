<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资组合 - 基智回测</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --success-color: #4cc9f0;
            --warning-color: #f8961e;
            --danger-color: #f72585;
            --light-bg: #f8f9fa;
            --border-color: #dee2e6;
            --text-secondary: #6c757d;
            --radius: 8px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        header .subtitle {
            color: var(--text-secondary);
            margin: 0.5rem 0 0 0;
            font-size: 0.95rem;
        }
        
        .header-nav {
            display: flex;
            gap: 1rem;
        }
        
        .header-nav a {
            color: var(--primary-color);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            transition: all 0.2s;
        }
        
        .header-nav a:hover {
            background: var(--light-bg);
        }
        
        .header-nav a.active {
            background: var(--primary-color);
            color: white;
        }
        
        .portfolio-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
        }
        
        /* 组合列表 */
        .portfolio-list-panel {
            background: white;
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }
        
        .panel-header h2 {
            margin: 0;
            color: #333;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--primary-color), #3a56d4);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
        }
        
        .btn-secondary {
            padding: 0.6rem 1rem;
            background: white;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            border-radius: var(--radius);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-secondary:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-danger {
            background: var(--danger-color);
            color: white;
            border: none;
        }
        
        .btn-danger:hover {
            background: #e91e63;
        }
        
        /* 组合卡片 */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .portfolio-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: var(--radius);
            padding: 1.5rem;
            border-left: 4px solid var(--primary-color);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .portfolio-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        
        .portfolio-card.selected {
            border-left-color: var(--success-color);
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        }
        
        .portfolio-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .portfolio-card h3 {
            margin: 0;
            color: #333;
            font-size: 1.2rem;
            flex: 1;
        }
        
        .portfolio-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        
        .badge-conservative {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        .badge-steady {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .badge-aggressive {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .badge-custom {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        
        .portfolio-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .stat-item {
            background: white;
            padding: 0.75rem;
            border-radius: var(--radius);
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }
        
        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }
        
        .stat-value.positive {
            color: #d63031;
        }
        
        .stat-value.negative {
            color: #388e3c;
        }
        
        .portfolio-funds {
            background: white;
            padding: 0.75rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
        }
        
        .portfolio-funds-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .fund-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .fund-tag {
            background: var(--light-bg);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--primary-color);
            font-family: monospace;
        }
        
        .portfolio-card-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .portfolio-card-actions button {
            flex: 1;
            justify-content: center;
            font-size: 0.85rem;
            padding: 0.5rem;
        }
        
        /* 右侧面板 */
        .side-panel {
            background: white;
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        
        .side-panel h2 {
            margin: 0 0 1.5rem 0;
            color: #333;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-help {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 4rem;
            color: #dee2e6;
            margin-bottom: 1rem;
        }
        
        .empty-state h3 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        /* 加载状态 */
        .loading-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        .loading-state i {
            font-size: 3rem;
            color: var(--primary-color);
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .modal-header h3 {
            margin: 0;
            color: #333;
        }
        
        .close-modal {
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-modal:hover {
            color: #333;
        }
        
        /* 添加基金到组合的列表 */
        .fund-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            margin-bottom: 1rem;
        }
        
        .fund-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        
        .fund-list-item:last-child {
            border-bottom: none;
        }
        
        .fund-list-item:hover {
            background: var(--light-bg);
        }
        
        .fund-info {
            flex: 1;
        }
        
        .fund-code-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.25rem;
        }
        
        .fund-code {
            font-family: monospace;
            color: var(--primary-color);
            margin-right: 0.5rem;
        }
        
        .fund-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .fund-weight-input {
            width: 80px;
            padding: 0.4rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            text-align: right;
        }
        
        .remove-fund-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            margin-left: 0.5rem;
        }
        
        .remove-fund-btn:hover {
            background: var(--danger-color);
            color: white;
            border-radius: 4px;
        }
        
        .total-weight {
            background: var(--light-bg);
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .total-weight.warning {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .total-weight.error {
            background: #ffebee;
            color: #d63031;
        }
        
        .total-weight.success {
            background: #e8f5e9;
            color: #388e3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1><i class="fas fa-briefcase"></i> 投资组合</h1>
                <p class="subtitle">创建、管理和回测您的投资组合</p>
            </div>
            <nav class="header-nav">
                <a href="index.html">首页</a>
                <a href="screening.html">基金筛选</a>
                <a href="portfolio.html" class="active">投资组合</a>
                <a href="#">帮助中心</a>
            </nav>
        </header>

        <div class="portfolio-layout">
            <!-- 左侧：组合列表 -->
            <main class="portfolio-list-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-folder-open"></i> 我的组合</h2>
                    <button class="btn-primary" id="createPortfolioBtn">
                        <i class="fas fa-plus"></i> 新建组合
                    </button>
                </div>

                <div id="portfolioListContent">
                    <!-- 初始状态 -->
                    <div class="empty-state" id="emptyState">
                        <i class="fas fa-folder-open"></i>
                        <h3>暂无投资组合</h3>
                        <p>点击右上角"新建组合"创建您的第一个投资组合</p>
                    </div>

                    <!-- 加载状态 -->
                    <div class="loading-state" id="loadingState" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>正在加载投资组合...</p>
                    </div>

                    <!-- 组合卡片网格 -->
                    <div class="portfolio-grid" id="portfolioGrid" style="display: none;">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </main>

            <!-- 右侧：操作面板 -->
            <aside class="side-panel" id="actionPanel" style="display: none;">
                <h2><i class="fas fa-cog"></i> 组合操作</h2>
                
                <div id="selectedPortfolioInfo">
                    <div class="form-group">
                        <label>当前选择</label>
                        <div style="font-weight: 600; color: #333;" id="selectedPortfolioName">--</div>
                    </div>
                    
                    <button class="btn-primary" id="backtestBtn" style="width: 100%; margin-bottom: 0.75rem;">
                        <i class="fas fa-rocket"></i> 开始回测
                    </button>
                    
                    <button class="btn-secondary" id="editFundsBtn" style="width: 100%; margin-bottom: 0.75rem;">
                        <i class="fas fa-edit"></i> 编辑持仓
                    </button>
                    
                    <button class="btn-secondary" id="duplicateBtn" style="width: 100%; margin-bottom: 0.75rem;">
                        <i class="fas fa-copy"></i> 复制组合
                    </button>
                    
                    <button class="btn-secondary btn-danger" id="deleteBtn" style="width: 100%;">
                        <i class="fas fa-trash"></i> 删除组合
                    </button>
                </div>
            </aside>
        </div>

        <footer style="text-align: center; padding: 2rem; color: white; margin-top: 2rem;">
            <p>基智回测 &copy; 2026 | 投资有风险，入市需谨慎</p>
        </footer>
    </div>

    <!-- 模态框：新建/编辑组合 -->
    <div class="modal" id="portfolioModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fas fa-plus"></i> 新建投资组合</h3>
                <button class="close-modal">&times;</button>
            </div>
            
            <form id="portfolioForm">
                <input type="hidden" id="portfolioId">
                
                <div class="form-group">
                    <label for="portfolioName">组合名称 *</label>
                    <input type="text" id="portfolioName" required placeholder="如：稳健增长组合">
                </div>
                
                <div class="form-group">
                    <label for="portfolioDescription">组合描述</label>
                    <textarea id="portfolioDescription" placeholder="描述您的投资策略..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="portfolioRiskLevel">风险等级</label>
                    <select id="portfolioRiskLevel">
                        <option value="保守">保守 - 低风险，稳定收益</option>
                        <option value="稳健" selected>稳健 - 平衡风险与收益</option>
                        <option value="积极">积极 - 高风险，高收益</option>
                        <option value="自定义">自定义</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>持仓基金</label>
                    <div class="fund-list" id="portfolioFundList">
                        <div style="padding: 1.5rem; text-align: center; color: var(--text-secondary);">
                            暂无持仓基金
                        </div>
                    </div>
                    
                    <button type="button" class="btn-secondary" id="addFundBtn" style="width: 100%;">
                        <i class="fas fa-plus"></i> 添加基金
                    </button>
                </div>
                
                <div class="total-weight" id="totalWeightDisplay">
                    <span>总权重：</span>
                    <span id="totalWeightValue">0%</span>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%;">
                    <i class="fas fa-save"></i> 保存组合
                </button>
            </form>
        </div>
    </div>

    <!-- 模态框：选择基金 -->
    <div class="modal" id="selectFundModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-search"></i> 添加基金到组合</h3>
                <button class="close-modal">&times;</button>
            </div>
            
            <div class="form-group">
                <label for="searchFundInput">搜索基金</label>
                <input type="text" id="searchFundInput" placeholder="输入基金代码或名称...">
            </div>
            
            <div class="fund-list" id="searchFundList">
                <!-- 动态生成 -->
            </div>
            
            <button class="btn-primary" id="confirmAddFundBtn" style="width: 100%;">
                <i class="fas fa-check"></i> 确认添加
            </button>
        </div>
    </div>

    <script src="js/portfolio.js"></script>
</body>
</html>
