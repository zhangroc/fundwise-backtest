<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的组合 - 基智回测</title>
    <script src="includes/api-config.js"></script>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="lib/all.min.css">
    <style>
        /* 组合页面特定样式 */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .portfolio-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }
        
        .portfolio-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .portfolio-card .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin: 0;
        }
        
        .portfolio-card .risk-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .portfolio-card .risk-badge.conservative { background: #dbeafe; color: #2563eb; }
        .portfolio-card .risk-badge.moderate { background: #d1fae5; color: #059669; }
        .portfolio-card .risk-badge.aggressive { background: #fee2e2; color: #dc2626; }
        
        .portfolio-card .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .portfolio-card .stat-item {
            text-align: center;
        }
        
        .portfolio-card .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }
        
        .portfolio-card .stat-value {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
        }
        
        .portfolio-card .stat-value.positive { color: #10b981; }
        .portfolio-card .stat-value.negative { color: #ef4444; }
        
        .portfolio-card .fund-list {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
        }
        
        .portfolio-card .fund-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            font-size: 0.875rem;
        }
        
        .portfolio-card .fund-item .fund-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 1rem;
        }
        
        .portfolio-card .fund-item .fund-weight {
            font-weight: 600;
            color: #64748b;
        }
        
        .portfolio-card .actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
        }
        
        /* 创建组合卡片 */
        .create-portfolio-card {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border: 2px dashed #cbd5e1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .create-portfolio-card:hover {
            border-color: #2563eb;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
        }
        
        .create-portfolio-card i {
            font-size: 3rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }
        
        .create-portfolio-card span {
            color: #64748b;
            font-weight: 500;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
        }
        
        .empty-state h3 {
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <span class="logo-text">基智回测</span>
            </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="index.html" class="nav-link"><i class="fas fa-home"></i><span>首页</span></a>
                    <a href="screening.html" class="nav-link"><i class="fas fa-filter"></i><span>基金筛选</span></a>
                    <a href="portfolio.html" class="nav-link active"><i class="fas fa-briefcase"></i><span>我的组合</span></a>
                    <a href="backtest.html" class="nav-link"><i class="fas fa-chart-area"></i><span>回测分析</span></a>
                    <a href="compare.html" class="nav-link"><i class="fas fa-balance-scale"></i><span>组合对比</span></a>
                    <a href="detail.html" class="nav-link"><i class="fas fa-chart-bar"></i><span>基金详情</span></a>
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">我的组合</h1>
                    <p class="page-subtitle">管理您的投资组合</p>
                </div>
            </header>

            <div class="page-content">
                <!-- 组合列表 -->
                <div class="portfolio-grid" id="portfolioList">
                    <!-- 示例组合卡片 -->
                    <div class="portfolio-card">
                        <div class="card-header">
                            <h3 class="card-title">智能稳健组合</h3>
                            <span class="risk-badge moderate">稳健型</span>
                        </div>
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-label">基金数量</div>
                                <div class="stat-value">3只</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">年化收益</div>
                                <div class="stat-value positive">+8.5%</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">最大回撤</div>
                                <div class="stat-value negative">-12.3%</div>
                            </div>
                        </div>
                        <div class="fund-list">
                            <div class="fund-item">
                                <span class="fund-name">华夏新锦程混合C</span>
                                <span class="fund-weight">35%</span>
                            </div>
                            <div class="fund-item">
                                <span class="fund-name">景顺长城精锐成长混合C</span>
                                <span class="fund-weight">35%</span>
                            </div>
                            <div class="fund-item">
                                <span class="fund-name">明亚远臻智选混合A</span>
                                <span class="fund-weight">30%</span>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn btn-primary btn-sm" onclick="runBacktest(1)"><i class="fas fa-play"></i> 回测</button>
                            <button class="btn btn-secondary btn-sm" onclick="editPortfolio(1)"><i class="fas fa-edit"></i> 编辑</button>
                        </div>
                    </div>
                    
                    <!-- 创建新组合 -->
                    <div class="portfolio-card create-portfolio-card" onclick="createNewPortfolio()">
                        <i class="fas fa-plus-circle"></i>
                        <span>创建新组合</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function createNewPortfolio() {
            // 跳转到智能推荐页面创建组合
            window.location.href = 'screening.html';
        }
        
        // BUG-005: 回测按钮点击事件
        function runBacktest(portfolioId) {
            window.location.href = `backtest.html?portfolioId=${portfolioId}`;
        }
        
        // BUG-006: 编辑按钮点击事件
        function editPortfolio(portfolioId) {
            alert('编辑组合功能开发中，组合ID: ' + portfolioId);
        }
        
        // 加载组合列表
        async function loadPortfolios() {
            // TODO: 调用 API 获取组合列表
            console.log('加载组合列表...');
        }
        
        document.addEventListener('DOMContentLoaded', loadPortfolios);
    </script>
</body>
</html>
