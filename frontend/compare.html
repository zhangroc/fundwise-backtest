<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组合对比 - 基智回测</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="lib/all.min.css">
    <script src="lib/chart.min.js"></script>
    <style>
        /* 对比页面样式 */
        .compare-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .compare-card {
            background: white;
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .compare-card h3 {
            font-size: 0.95rem;
            color: #1e293b;
            margin: 0 0 1rem 0;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .compare-card select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        
        .compare-card .placeholder {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }
        
        .compare-card .placeholder i {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            display: block;
        }
        
        /* 指标对比 */
        .metrics-compare {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }
        
        .metrics-compare h3 {
            font-size: 1rem;
            color: #1e293b;
            margin: 0 0 1.25rem 0;
        }
        
        .metrics-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .metrics-table th,
        .metrics-table td {
            padding: 0.875rem;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .metrics-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #64748b;
            font-size: 0.85rem;
        }
        
        .metrics-table td:first-child {
            text-align: left;
            font-weight: 500;
            color: #1e293b;
        }
        
        .metrics-table .winner {
            color: #10b981;
            font-weight: 600;
        }
        
        /* 图表 */
        .chart-section {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .chart-section h3 {
            font-size: 1rem;
            color: #1e293b;
            margin: 0 0 1rem 0;
        }
        
        .chart-container {
            height: 300px;
        }
        
        /* 添加组合按钮 */
        .add-compare {
            background: white;
            border-radius: 12px;
            padding: 1.25rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        .add-compare button {
            width: 100%;
            padding: 1rem;
            background: #f8fafc;
            border: 2px dashed #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            color: #64748b;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .add-compare button:hover {
            border-color: #2563eb;
            background: #eff6ff;
            color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <span class="logo-text">基智回测</span>
            </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="index.html" class="nav-link"><i class="fas fa-home"></i><span>首页</span></a>
                    <a href="screening.html" class="nav-link"><i class="fas fa-filter"></i><span>基金筛选</span></a>
                    <a href="portfolio.html" class="nav-link"><i class="fas fa-briefcase"></i><span>我的组合</span></a>
                    <a href="backtest.html" class="nav-link"><i class="fas fa-chart-area"></i><span>回测分析</span></a>
                    <a href="compare.html" class="nav-link active"><i class="fas fa-balance-scale"></i><span>组合对比</span></a>
                    <a href="detail.html" class="nav-link"><i class="fas fa-chart-bar"></i><span>基金详情</span></a>
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">组合对比</h1>
                    <p class="page-subtitle">多维度对比不同投资组合</p>
                </div>
            </header>

            <div class="page-content">
                <!-- 选择对比组合 -->
                <div class="compare-container">
                    <div class="compare-card">
                        <h3><i class="fas fa-briefcase"></i> 组合 A</h3>
                        <select id="portfolioA" onchange="comparePortfolios()">
                            <option value="">选择组合</option>
                            <option value="3">智能稳健组合</option>
                        </select>
                        <div class="placeholder" id="placeholderA">
                            <i class="fas fa-hand-pointer"></i>
                            请选择要对比的组合
                        </div>
                    </div>
                    <div class="compare-card">
                        <h3><i class="fas fa-briefcase"></i> 组合 B</h3>
                        <select id="portfolioB" onchange="comparePortfolios()">
                            <option value="">选择组合</option>
                            <option value="3">智能稳健组合</option>
                        </select>
                        <div class="placeholder" id="placeholderB">
                            <i class="fas fa-hand-pointer"></i>
                            请选择要对比的组合
                        </div>
                    </div>
                </div>
                
                <!-- 指标对比 -->
                <div class="metrics-compare">
                    <h3><i class="fas fa-chart-bar"></i> 核心指标对比</h3>
                    <table class="metrics-table">
                        <thead>
                            <tr>
                                <th>指标</th>
                                <th>组合 A</th>
                                <th>组合 B</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>年化收益率</td>
                                <td id="metricA-return">--</td>
                                <td id="metricB-return">--</td>
                            </tr>
                            <tr>
                                <td>最大回撤</td>
                                <td id="metricA-drawdown">--</td>
                                <td id="metricB-drawdown">--</td>
                            </tr>
                            <tr>
                                <td>夏普比率</td>
                                <td id="metricA-sharpe">--</td>
                                <td id="metricB-sharpe">--</td>
                            </tr>
                            <tr>
                                <td>波动率</td>
                                <td id="metricA-volatility">--</td>
                                <td id="metricB-volatility">--</td>
                            </tr>
                            <tr>
                                <td>胜率</td>
                                <td id="metricA-winrate">--</td>
                                <td id="metricB-winrate">--</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 收益曲线对比 -->
                <div class="chart-section">
                    <h3><i class="fas fa-chart-line"></i> 收益曲线对比</h3>
                    <div class="chart-container">
                        <canvas id="compareChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let compareChart = null;
        
        async function comparePortfolios() {
            const portfolioA = document.getElementById('portfolioA').value;
            const portfolioB = document.getElementById('portfolioB').value;
            
            // 更新占位符显示
            document.getElementById('placeholderA').style.display = portfolioA ? 'none' : 'block';
            document.getElementById('placeholderB').style.display = portfolioB ? 'none' : 'block';
            
            if (!portfolioA || !portfolioB) return;
            
            // 模拟数据展示
            const mockData = {
                return: { a: '+8.5%', b: '+6.2%' },
                drawdown: { a: '-12.3%', b: '-15.8%' },
                sharpe: { a: '1.2', b: '0.9' },
                volatility: { a: '8.4%', b: '10.2%' },
                winrate: { a: '58%', b: '52%' }
            };
            
            document.getElementById('metricA-return').textContent = mockData.return.a;
            document.getElementById('metricB-return').textContent = mockData.return.b;
            document.getElementById('metricA-drawdown').textContent = mockData.drawdown.a;
            document.getElementById('metricB-drawdown').textContent = mockData.drawdown.b;
            document.getElementById('metricA-sharpe').textContent = mockData.sharpe.a;
            document.getElementById('metricB-sharpe').textContent = mockData.sharpe.b;
            document.getElementById('metricA-volatility').textContent = mockData.volatility.a;
            document.getElementById('metricB-volatility').textContent = mockData.volatility.b;
            document.getElementById('metricA-winrate').textContent = mockData.winrate.a;
            document.getElementById('metricB-winrate').textContent = mockData.winrate.b;
            
            // 绘制对比图表
            drawCompareChart();
        }
        
        function drawCompareChart() {
            const ctx = document.getElementById('compareChart').getContext('2d');
            
            if (compareChart) compareChart.destroy();
            
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            
            compareChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [
                        {
                            label: '组合 A',
                            data: [1.0, 1.02, 1.05, 1.03, 1.06, 1.08, 1.07, 1.09, 1.11, 1.08, 1.10, 1.085],
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '组合 B',
                            data: [1.0, 1.01, 1.03, 1.01, 1.04, 1.05, 1.04, 1.06, 1.07, 1.05, 1.06, 1.062],
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: false }
                    }
                }
            });
        }
    </script>
</body>
</html>
