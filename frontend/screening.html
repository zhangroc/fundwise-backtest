<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
    <title>基金筛选 - 基智回测</title>
    <script src="includes/api-client.js"></script>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 筛选页面特定样式 */
        .filter-bar {
            background: white;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .filter-bar .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }
        
        .filter-bar .filter-item {
            flex: 1;
            min-width: 150px;
            max-width: 200px;
        }
        
        .filter-bar .filter-item label {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 0.35rem;
            display: block;
        }
        
        .filter-bar .filter-item select,
        .filter-bar .filter-item input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.875rem;
            background: white;
        }
        
        .filter-bar .filter-item select:focus,
        .filter-bar .filter-item input:focus {
            outline: none;
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
        }
        
        .filter-bar .filter-actions {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }
        
        .filter-bar .btn {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        
        /* 结果统计 */
        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0 0.5rem;
        }
        
        .results-info .count {
            font-size: 0.9rem;
            color: #64748b;
        }
        
        .results-info .count strong {
            color: #1e293b;
        }
        
        /* 基金卡片表格 */
        .fund-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        .fund-table th {
            background: #f8fafc;
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.8rem;
            color: #64748b;
            border-bottom: 2px solid #e2e8f0;
            position: sticky;
            top: 0;
        }
        
        .fund-table td {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.875rem;
        }
        
        .fund-table tr:hover {
            background: #f8fafc;
        }
        
        .fund-table .fund-code {
            font-weight: 600;
            color: #2563eb;
        }
        
        .fund-table .fund-name {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .fund-table .fund-type {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            background: #f1f5f9;
            color: #64748b;
        }
        
        .fund-table .fund-type.index {
            background: #dbeafe;
            color: #2563eb;
        }
        
        .fund-table .fund-size {
            font-weight: 500;
        }
        
        .fund-table .fund-actions .btn {
            padding: 0.35rem 0.75rem;
            font-size: 0.75rem;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding: 1rem 0;
        }
        
        .pagination button {
            padding: 0.5rem 0.75rem;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #f1f5f9;
            border-color: #2563eb;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination .page-info {
            font-size: 0.875rem;
            color: #64748b;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }
        
        .loading i {
            font-size: 2rem;
            margin-bottom: 1rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <span class="logo-text">基智回测</span>
            </div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i><span>首页</span></a>
                <a href="screening.html" class="nav-link"><i class="fas fa-filter"></i><span>基金筛选</span></a>
                <a href="recommend.html" class="nav-link"><i class="fas fa-lightbulb"></i><span>智能推荐</span></a>
                <a href="portfolio.html" class="nav-link"><i class="fas fa-folder"></i><span>我的组合</span></a>
                <a href="backtest.html" class="nav-link"><i class="fas fa-chart-line"></i><span>历史回测</span></a>
                <a href="compare.html" class="nav-link"><i class="fas fa-balance-scale"></i><span>组合对比</span></a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">基金筛选</h1>
                    <p class="page-subtitle">多维度筛选，发现优质标的</p>
                </div>
            </header>

            <div class="page-content">
                <!-- 筛选条件栏 -->
                <div class="filter-bar">
                    <div class="filter-row">
                        <div class="filter-item">
                            <label>基金类型</label>
                            <select id="fundType">
                                <option value="all">全部类型</option>
                                <option value="股票型">股票型</option>
                                <option value="混合型">混合型</option>
                                <option value="债券型">债券型</option>
                                <option value="指数型">指数型</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label>风险等级</label>
                            <select id="riskLevel">
                                <option value="all">全部</option>
                                <option value="保守">保守型</option>
                                <option value="稳健">稳健型</option>
                                <option value="积极">积极型</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label>基金规模</label>
                            <select id="fundSize">
                                <option value="all">全部</option>
                                <option value="10">10亿以上</option>
                                <option value="50">50亿以上</option>
                                <option value="100">100亿以上</option>
                                <option value="200">200亿以上</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label>成立年限</label>
                            <select id="establishYears">
                                <option value="all">全部</option>
                                <option value="3">3年以上</option>
                                <option value="5">5年以上</option>
                                <option value="10">10年以上</option>
                            </select>
                        </div>
                        <div class="filter-item">
                            <label>只看指数基金</label>
                            <select id="indexFundOnly">
                                <option value="false">全部基金</option>
                                <option value="true">仅指数基金</option>
                            </select>
                        </div>
                        <div class="filter-actions">
                            <button class="btn btn-primary" onclick="searchFunds()">
                                <i class="fas fa-search"></i> 筛选
                            </button>
                            <button class="btn btn-secondary" onclick="resetFilters()">
                                <i class="fas fa-redo"></i> 重置
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 结果信息 -->
                <div class="results-info">
                    <span class="count">找到 <strong id="totalCount">0</strong> 只符合条件的基金</span>
                </div>

                <!-- 基金列表 -->
                <div class="card">
                    <div class="card-body" style="padding: 0;">
                        <div id="loading" class="loading">
                            <i class="fas fa-spinner"></i>
                            <div>加载中...</div>
                        </div>
                        <div id="results" style="display: none;">
                            <table class="fund-table">
                                <thead>
                                    <tr>
                                        <th>基金代码</th>
                                        <th>基金名称</th>
                                        <th>类型</th>
                                        <th>风险等级</th>
                                        <th>规模(亿)</th>
                                        <th>成立时间</th>
                                        <th>净值记录</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="fundTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 分页 -->
                <div class="pagination" id="pagination">
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 20;
        let totalCount = 0;

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', () => {
            searchFunds();
        });

        async function searchFunds() {
            showLoading(true);
            
            const fundType = document.getElementById('fundType').value;
            const fundSize = document.getElementById('fundSize').value;
            const establishYears = document.getElementById('establishYears').value;
            const indexFundOnly = document.getElementById('indexFundOnly').value === 'true';
            
            let url = `${API_BASE_URL}${API.funds.screen}?page=${currentPage}&pageSize=${pageSize}`;
            
            if (fundType !== 'all') url += `&fundType=${encodeURIComponent(fundType)}`;
            if (fundSize !== 'all') url += `&minSize=${fundSize}`;
            if (establishYears !== 'all') url += `&minYears=${establishYears}`;
            if (indexFundOnly) url += `&indexFundOnly=true`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    totalCount = data.total || 0;
                    renderFunds(data.data || []);
                    document.getElementById('totalCount').textContent = totalCount.toLocaleString();
                    renderPagination();
                }
            } catch (e) {
                console.error('加载失败:', e);
                alert('加载数据失败，请稍后重试');
            } finally {
                showLoading(false);
            }
        }

        function renderFunds(funds) {
            const tbody = document.getElementById('fundTableBody');
            
            if (funds.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 2rem; color: #64748b;">暂无符合条件的基金</td></tr>';
                return;
            }
            
            tbody.innerHTML = funds.map(fund => `
                <tr>
                    <td class="fund-code">${fund.code}</td>
                    <td class="fund-name" title="${fund.name}">${fund.name}</td>
                    <td><span class="fund-type ${fund.isIndexFund ? 'index' : ''}">${fund.type || '混合型'}</span></td>
                    <td>${fund.riskLevel || '-'}</td>
                    <td class="fund-size">${fund.totalAssets ? fund.totalAssets.toFixed(2) : '-'}</td>
                    <td>${fund.establishedYears ? fund.establishedYears + '年' : '-'}</td>
                    <td>${fund.navRecordCount || 0}条</td>
                    <td class="fund-actions">
                        <a href="detail.html?code=${fund.code}" class="btn btn-sm btn-secondary">详情</a>
                    </td>
                </tr>
            `).join('');
        }

        function renderPagination() {
            const totalPages = Math.ceil(totalCount / pageSize);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">上一页</button>`;
            html += `<span class="page-info">${currentPage} / ${totalPages}</span>`;
            html += `<button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">下一页</button>`;
            
            pagination.innerHTML = html;
        }

        function goPage(page) {
            currentPage = page;
            searchFunds();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetFilters() {
            document.getElementById('fundType').value = 'all';
            document.getElementById('riskLevel').value = 'all';
            document.getElementById('fundSize').value = 'all';
            document.getElementById('establishYears').value = 'all';
            document.getElementById('indexFundOnly').value = 'false';
            currentPage = 1;
            searchFunds();
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('results').style.display = show ? 'none' : 'block';
        }
    </script>
</body>
</html>
