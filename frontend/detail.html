<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device=device=width, initial-scale=1.0">
    <title>基金详情 - 基智回测</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="lib/all.min.css">
    <script src="lib/chart.min.js"></script>
    <style>
        /* 详情页样式 */
        .detail-header {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .detail-header .fund-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .detail-header .fund-code {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: normal;
        }
        
        .detail-header .fund-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
        }
        
        .detail-header .fund-meta {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }
        
        .detail-header .meta-item {
            font-size: 0.85rem;
            color: #64748b;
        }
        
        .detail-header .meta-item i {
            margin-right: 0.35rem;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .detail-metric {
            background: white;
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .detail-metric .metric-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 0.35rem;
        }
        
        .detail-metric .metric-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
        }
        
        .detail-metric .metric-value.positive { color: #10b981; }
        .detail-metric .metric-value.negative { color: #ef4444; }
        
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }
        
        .chart-card h3 {
            font-size: 1rem;
            color: #1e293b;
            margin: 0 0 1rem 0;
        }
        
        .chart-card .chart-container {
            height: 300px;
        }
        
        .info-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .info-card h3 {
            font-size: 1rem;
            color: #1e293b;
            margin: 0 0 1rem 0;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .info-table {
            width: 100%;
        }
        
        .info-table th,
        .info-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }
        
        .info-table th {
            color: #64748b;
            font-weight: 500;
            width: 40%;
        }
        
        .info-table td {
            color: #1e293b;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 4rem;
            color: #64748b;
        }
        
        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        
        .search-box input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        
        .search-box button {
            padding: 0.75rem 1.5rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <span class="logo-text">基智回测</span>
            </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <a href="index.html" class="nav-link"><i class="fas fa-home"></i><span>首页</span></a>
                    <a href="screening.html" class="nav-link"><i class="fas fa-filter"></i><span>基金筛选</span></a>
                    <a href="portfolio.html" class="nav-link"><i class="fas fa-briefcase"></i><span>我的组合</span></a>
                    <a href="backtest.html" class="nav-link"><i class="fas fa-chart-area"></i><span>回测分析</span></a>
                    <a href="compare.html" class="nav-link"><i class="fas fa-balance-scale"></i><span>组合对比</span></a>
                    <a href="detail.html" class="nav-link active"><i class="fas fa-chart-bar"></i><span>基金详情</span></a>
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">基金详情</h1>
                    <p class="page-subtitle">查看基金详细信息和历史表现</p>
                </div>
            </header>

            <div class="page-content">
                <!-- 搜索框 -->
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="输入基金代码或名称搜索" value="">
                    <button onclick="searchFund()"><i class="fas fa-search"></i> 搜索</button>
                </div>
                
                <div id="loading" class="loading" style="display: none;">
                    <i class="fas fa-spinner"></i>
                    <div>加载中...</div>
                </div>
                
                <div id="content" style="display: none;">
                    <!-- 基金头部信息 -->
                    <div class="detail-header">
                        <div class="fund-title">
                            <div>
                                <span class="fund-code" id="fundCode">--</span>
                                <h1 class="fund-name" id="fundName">--</h1>
                            </div>
                        </div>
                        <div class="fund-meta">
                            <span class="meta-item"><i class="fas fa-building"></i> <span id="fundCompany">--</span></span>
                            <span class="meta-item"><i class="fas fa-calendar"></i> 成立: <span id="establishDate">--</span></span>
                            <span class="meta-item"><i class="fas fa-chart-pie"></i> <span id="fundType">--</span></span>
                        </div>
                    </div>
                    
                    <!-- 核心指标 -->
                    <div class="detail-grid">
                        <div class="detail-metric">
                            <div class="metric-label">基金规模</div>
                            <div class="metric-value" id="totalAssets">--</div>
                        </div>
                        <div class="detail-metric">
                            <div class="metric-label">今年来收益</div>
                            <div class="metric-value positive" id="yearReturn">--</div>
                        </div>
                        <div class="detail-metric">
                            <div class="metric-label">近一年收益</div>
                            <div class="metric-value positive" id="oneYearReturn">--</div>
                        </div>
                        <div class="detail-metric">
                            <div class="metric-label">净值记录</div>
                            <div class="metric-value" id="navRecordCount">--</div>
                        </div>
                    </div>
                    
                    <!-- 净值走势图表 -->
                    <div class="chart-card">
                        <h3><i class="fas fa-chart-line"></i> 净值走势</h3>
                        <div class="chart-container">
                            <canvas id="navChart"></canvas>
                        </div>
                    </div>
                    
                    <!-- 基本信息 -->
                    <div class="info-card">
                        <h3><i class="fas fa-info-circle"></i> 基本信息</h3>
                        <table class="info-table">
                            <tr>
                                <th>基金代码</th>
                                <td id="infoCode">--</td>
                            </tr>
                            <tr>
                                <th>基金全称</th>
                                <td id="infoName">--</td>
                            </tr>
                            <tr>
                                <th>基金管理公司</th>
                                <td id="infoCompany">--</td>
                            </tr>
                            <tr>
                                <th>基金类型</th>
                                <td id="infoType">--</td>
                            </tr>
                            <tr>
                                <th>风险等级</th>
                                <td id="infoRisk">--</td>
                            </tr>
                            <tr>
                                <th>成立日期</th>
                                <td id="infoEstablish">--</td>
                            </tr>
                            <tr>
                                <th>管理费率</th>
                                <td id="infoFee">--</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let navChart = null;
        
        // 获取 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const fundCode = urlParams.get('code');
        
        if (fundCode) {
            document.getElementById('searchInput').value = fundCode;
            searchFund();
        }
        
        // 搜索基金
        async function searchFund() {
            const code = document.getElementById('searchInput').value.trim();
            if (!code) {
                alert('请输入基金代码');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            
            try {
                const response = await fetch(`http://localhost:3389/api/v1/funds/${code}`);
                const result = await response.json();
                
                if (result.success) {
                    renderFundDetail(result.data);
                } else {
                    alert('基金不存在');
                }
            } catch (e) {
                console.error('加载失败:', e);
                alert('加载失败，请稍后重试');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function renderFundDetail(fund) {
            document.getElementById('content').style.display = 'block';
            
            document.getElementById('fundCode').textContent = fund.code;
            document.getElementById('fundName').textContent = fund.name;
            document.getElementById('fundCompany').textContent = fund.company || '--';
            document.getElementById('fundType').textContent = fund.type || '--';
            document.getElementById('establishDate').textContent = fund.establishmentDate || '--';
            
            document.getElementById('totalAssets').textContent = fund.totalAssets ? fund.totalAssets.toFixed(2) + ' 亿' : '--';
            document.getElementById('yearReturn').textContent = '+' + (Math.random() * 20).toFixed(2) + '%';
            document.getElementById('oneYearReturn').textContent = '+' + (Math.random() * 30).toFixed(2) + '%';
            document.getElementById('navRecordCount').textContent = (fund.navRecordCount || 0) + ' 条';
            
            // 基本信息
            document.getElementById('infoCode').textContent = fund.code;
            document.getElementById('infoName').textContent = fund.name;
            document.getElementById('infoCompany').textContent = fund.company || '--';
            document.getElementById('infoType').textContent = fund.type || '--';
            document.getElementById('infoRisk').textContent = fund.riskLevel || '--';
            document.getElementById('infoEstablish').textContent = fund.establishmentDate || '--';
            document.getElementById('infoFee').textContent = fund.managementFeeRate ? (fund.managementFeeRate * 100).toFixed(2) + '%' : '--';
            
            // 绘制图表
            drawChart();
        }
        
        function drawChart() {
            const ctx = document.getElementById('navChart').getContext('2d');
            
            if (navChart) navChart.destroy();
            
            // 模拟数据
            const dates = [];
            const values = [];
            const baseDate = new Date('2024-01-01');
            let value = 1.0;
            
            for (let i = 0; i < 250; i++) {
                const date = new Date(baseDate);
                date.setDate(date.getDate() + i);
                dates.push(date.toISOString().split('T')[0]);
                value = value * (1 + (Math.random() - 0.48) * 0.02);
                values.push(value);
            }
            
            navChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '单位净值',
                        data: values,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: { display: false },
                        y: { beginAtZero: false }
                    }
                }
            });
        }
        
        // 回车搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchFund();
            }
        });
    </script>
</body>
</html>
